<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ANTS-Lab{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; color: #e5e5e5; font-family: system-ui, sans-serif; }
        .gov-banner { background: linear-gradient(90deg, #002654, #ed2939, #002654); height: 4px; }
        .card { background: #161616; border: 1px solid #262626; }
        .input { background: #0f0f0f; border: 1px solid #2a2a2a; color: #e5e5e5; }
        .input:focus { border-color: #10b981; outline: none; }
        .btn-primary { background: #10b981; color: #052e16; font-weight: 600; }
        .btn-primary:hover { background: #34d399; }
        .accent { color: #10b981; }
        .mono { font-family: 'Courier New', monospace; }
    </style>
</head>
<body>
    <div class="gov-banner"></div>
    <header class="border-b border-neutral-800 bg-neutral-950">
        <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="/" class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-500 rounded flex items-center justify-center font-bold text-neutral-900">A</div>
                <div>
                    <div class="font-bold tracking-tight">ANTS-Lab</div>
                    <div class="text-xs text-neutral-500">Agence Nationale des Titres Simulés — Environnement d'entraînement</div>
                </div>
            </a>
            <nav class="flex gap-4 text-sm">
                {% if session.get('user_id') %}
                    <a href="/dossier" class="hover:text-emerald-400">Mon dossier</a>
                    <a href="/import" class="hover:text-emerald-400">Importer</a>
                    <a href="/logout" class="text-neutral-400 hover:text-red-400">Déconnexion</a>
                {% else %}
                    <a href="/login" class="hover:text-emerald-400">Connexion</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-10">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-neutral-800 mt-20 py-6 text-center text-xs text-neutral-600">
        ⚠️ Environnement fictif à des fins pédagogiques (CTF). Aucun lien officiel avec l'ANTS.
    </footer>
</body>
</html>
